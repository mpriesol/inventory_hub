services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - hubnet

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - hubnet

  api:
    image: ghcr.io/mpriesol/inventory-hub-api:main
    environment:
      INVENTORY_DATA_ROOT: /data/inventory-data
      USE_POSTGRES: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/inventory-data:/data/inventory-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      hubnet:
        aliases:
          - api

  # one-shot builder: copies dist -> ./caddy/site
  frontend-build:
    image: ghcr.io/mpriesol/inventory-hub-frontend:main
    volumes:
      - ./caddy/site:/site
    command: sh -c "cp -r /usr/share/nginx/html/* /site/"
    networks:
      - hubnet

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/site:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - hubnet

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  hubnet:
    name: inventory-hub-net
